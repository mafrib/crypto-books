<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Crypto-Books</title>

    <link href="css/dashboard.css" rel="stylesheet" />
    <!-- D3.js library -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <!-- JavaScript files for the dashboard -->
    <script src="js/map.js"></script>
    <script src="js/network.js"></script>
    <script src="js/treemap.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/script.js"></script>
  </head>

  <body onload="startDashboard()">

    <nav class="navbar">
      <h1 class="title">Crypto-Books</h1>
      <ul>
        <li><a href="https://cryptobooksim.wixsite.com/cryptobooks">About</a></li>
        <li><a>Database</a></li>
      </div>
    </nav>
    <div class="dashboard-wrap">
      <div class="dashboard">
        <div class="visualization">
          <svg id="map"></svg>
          <div class="map-legend"></div>
        </div>
        <div class="visualization" id="network-graph">
          <div class="network-wrapper"></div>
          <div class="legend">
            <div class="legend-item author"></div>
            <div class="legend-item book"></div>
          </div>
          <div class="group-toggle">
            <div class="toggle-label">Group by gender</div>
            <div class="switch" role="button" aria-pressed="false" tabindex="0"></div>
          </div>
        </div>
         <div id="side-menu">
          <div class="button-group">
            <button id="filter-btn">
              <span>Filter</span>
              <img src="../icons/slider-filter.png" id="filter-icon"></img>
            </button>
            <button id="clear-btn">
              <span>Clear</span>
              <img src="../icons/clear-filter-inactive.png" id="clear-icon-inactive"></img>
            </button>
          </div>
          <div id="hover-details" class="details-panel">
            <p>Click or hover on elements to see more details here.</p>
          </div>
        </div>
        <div class="visualization" id="treemap">
          <div id="treemap-breadcrumbs"></div>
          <div id="treemap-controls">
            <button class="mode-button active" data-mode="category">Literary Categories</button>
            <button class="mode-button" data-mode="tradition">Intellectual Tradition</button>
          </div>
          <div id="treemap-area"></div>
          <div id="tooltip"></div>
        </div>
        <div class="visualization" id="catalog">
          <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for a book, author or library...">
            <img src="../icons/search.svg" id="search-icon"></img>
          </div>
          <div class="catalog-header">
            <h5 class="sortable" data-column="Obra">
              Title
              <img class="sort-icon" src="icons/sort-neutral.png"/>
            </h5>
            <h5 class="sortable" data-column="Nome_Autor">
              Author
              <img class="sort-icon" src="icons/sort-neutral.png"/>
            </h5>
            <h5 class="sortable" data-column="Livraria">
              Library
              <img class="sort-icon" src="icons/sort-up.png"/>
            </h5>
        </div>
          <div id="catalog-entries"></div>
          <div id="book-count"></div>
        </div>
      </div>
    </div>

  </body>
</html>
